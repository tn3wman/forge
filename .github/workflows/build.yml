name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact: forge-macos-arm64
          - name: macOS (Intel)
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact: forge-macos-x64
          - name: Linux (x64)
            runner: ubuntu-latest
            target: ""
            artifact: forge-linux-x64
          - name: Linux (ARM64)
            runner: ubuntu-24.04-arm
            target: ""
            artifact: forge-linux-arm64
          - name: Windows (x64)
            runner: windows-latest
            target: ""
            artifact: forge-windows-x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libssl-dev \
            pkg-config \
            patchelf \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target || 'default' }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-${{ matrix.target || 'default' }}-
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (with target)
        if: matrix.target != ''
        run: pnpm tauri build --target ${{ matrix.target }}
        working-directory: apps/desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (default target)
        if: matrix.target == ''
        run: pnpm tauri build
        working-directory: apps/desktop

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename artifacts to friendly names
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release

          echo "Downloaded artifact structure:"
          find artifacts -type f

          # Helper: find first file matching pattern in artifact dir
          grab() { find "artifacts/$1" -name "$2" -type f | head -1; }

          cp "$(grab forge-macos-arm64 '*.dmg')" "release/Forge-${VERSION}-Mac-Silicon.dmg"
          cp "$(grab forge-macos-x64 '*.dmg')" "release/Forge-${VERSION}-Mac-Intel.dmg"
          cp "$(grab forge-linux-x64 '*.deb')" "release/Forge-${VERSION}-Linux-AMD64.deb"
          cp "$(grab forge-linux-x64 '*.AppImage')" "release/Forge-${VERSION}-Linux-AMD64.AppImage"
          cp "$(grab forge-linux-arm64 '*.deb')" "release/Forge-${VERSION}-Linux-ARM64.deb"
          cp "$(grab forge-linux-arm64 '*.AppImage')" "release/Forge-${VERSION}-Linux-ARM64.AppImage"
          cp "$(grab forge-windows-x64 '*.exe')" "release/Forge-${VERSION}-Windows-Setup.exe"
          cp "$(grab forge-windows-x64 '*.msi')" "release/Forge-${VERSION}-Windows.msi"

          echo "Release artifacts:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*
